services:
  endee-oss:
    image: endeeai/endee:latest   
    container_name: endee-oss
    ports:
      - "8000:8080"  

    ulimits:
      nofile: 100000

    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""

    volumes:
      - endee-data:/data

    restart: unless-stopped

volumes:
  endee-data: